<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Focus Timer</title>
    <link rel="stylesheet" href="style002.css">
<body>

    <div class="container">
        <h1>Focus</h1>
        
        <div class="modes">
            <button class="mode-btn active" data-time="1500" data-color="#ff5252">standard</button>
            <button class="mode-btn" data-time="300" data-color="#4caf50">Short</button>
            <button class="mode-btn" data-time="900" data-color="#2196f3">Long</button>
        </div>

        <div class="timer-display" id="timer">25:00</div>
        
        <div class="controls">
            <button id="start" class="main-ctrl">START</button>
            <button id="reset" class="main-ctrl">RESET</button>
        </div>
    </div>

     <script src="script002.js"></script>
</body>
</html>
